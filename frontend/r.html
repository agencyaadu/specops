<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Report - SPEC-OPS</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#000; --surface:#0a0a0a; --border:rgba(255,255,255,0.14); --border-md:rgba(255,255,255,0.28);
    --text:#f2f2f2; --muted:#9a9a9a; --hint:#5a5a5a; --accent:#fff; --on-accent:#000;
    --green:#3ecf8e; --green-soft:rgba(62,207,142,0.10); --red:#f87171; --amber:#f5a524;
    --mono:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  html,body { background:var(--bg); }
  body { color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55; min-height:100vh; }
  .page { max-width:820px; margin:0 auto; padding:2.2rem 1.2rem 5rem; }
  .topbar { display:flex; justify-content:space-between; align-items:center; padding-bottom:1rem; border-bottom:1px solid var(--border); margin-bottom:1.6rem; }
  .topbar h1 { font-size:12px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; }
  .topbar .meta { font-size:10px; letter-spacing:.14em; color:var(--hint); text-transform:uppercase; }
  .card { border:1px solid var(--border); margin-bottom:1.1rem; }
  .card-head { display:flex; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); font-size:10px; letter-spacing:.18em; text-transform:uppercase; }
  .card-head .slash { color:var(--muted); }
  .card-head .tag { color:var(--muted); }
  .card-body { padding:18px 16px; }
  .ctx { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px 18px; }
  .ctx .k { color:var(--hint); font-size:10px; text-transform:uppercase; letter-spacing:.16em; }
  .ctx .v { color:var(--text); }
  .field { margin-bottom:.9rem; }
  .field:last-child { margin-bottom:0; }
  label { display:block; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  input,textarea,select {
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:13px; padding:8px 2px; outline:none;
  }
  input:focus,textarea:focus { border-bottom-color:var(--accent); }
  textarea { resize:vertical; min-height:60px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:640px) { .row2,.row3 { grid-template-columns:1fr; } }
  .btn {
    border:1px solid var(--border-md); background:transparent; color:var(--text);
    padding:10px 18px; font-family:var(--mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; cursor:pointer; transition:background .12s, border-color .12s;
    text-decoration:none; display:inline-block;
  }
  .btn:hover { border-color:var(--accent); background:var(--surface); }
  .btn.primary { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .btn.primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn.ghost { padding:6px 12px; font-size:10px; }
  .person { border:1px solid var(--border); padding:14px; margin-bottom:12px; }
  .person-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .photo-box {
    border:1px dashed var(--border-md); padding:14px; text-align:center; cursor:pointer;
    font-size:11px; color:var(--muted); letter-spacing:.08em;
  }
  .photo-box:hover { border-color:var(--accent); color:var(--text); }
  .photo-box input[type=file] { display:none; }
  .badge { display:inline-block; font-size:10px; letter-spacing:.14em; text-transform:uppercase; padding:3px 8px; border:1px solid var(--border); margin-top:8px; }
  .badge.ok { border-color:var(--green); color:var(--green); background:var(--green-soft); }
  .badge.warn { border-color:var(--amber); color:var(--amber); }
  .badge.err { border-color:var(--red); color:var(--red); }
  .event-row { display:grid; grid-template-columns:170px 1fr auto; gap:10px; margin-bottom:10px; }
  @media (max-width:640px) { .event-row { grid-template-columns:1fr; } }
  .submit-row { display:flex; justify-content:flex-end; margin-top:1.4rem; }
  .banner { padding:14px 16px; border:1px solid var(--border); margin-bottom:1rem; font-size:12px; }
  .banner.err { border-color:var(--red); color:var(--red); }
  .banner.ok { border-color:var(--green); color:var(--green); background:var(--green-soft); }
  .banner.warn { border-color:var(--amber); color:var(--amber); }
  .hidden { display:none; }
  .hint { font-size:11px; color:var(--hint); margin-top:4px; }
  .sub-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--hint); margin:1.2rem 0 .8rem; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .card-body > .sub-label:first-child { margin-top:0; }
</style>
<link rel="stylesheet" href="/assets/theme.css" />
<script src="/assets/theme.js"></script>
</head>
<body>

<div class="page">
  <div class="topbar">
    <h1>// Daily Report</h1>
    <div class="meta" id="meta">-</div>
  </div>

  <div class="quick-nav hidden" id="quick-nav" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem"></div>

  <!-- Op + date selector - always visible so users can switch without reloading. -->
  <section class="card" id="selector-card">
    <div class="card-head"><span><span class="slash">//</span>&nbsp; Select Report</span><span class="tag">00</span></div>
    <div class="card-body">
      <div class="row2">
        <div class="field">
          <label>Operation</label>
          <select id="sel-op"><option value="">Loading...</option></select>
        </div>
        <div class="field">
          <label>Report date</label>
          <input type="date" id="sel-date" />
          <div class="hint" id="sel-date-hint"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="status-banner" class="hidden"></div>

  <div id="app" class="hidden">
    <!-- OPERATION CONTEXT -->
    <section class="card">
      <div class="card-head"><span><span class="slash">//</span>&nbsp; Operation</span><span class="tag" id="op-id-tag"></span></div>
      <div class="card-body">
        <div class="ctx" id="op-ctx"></div>
      </div>
    </section>

    <!-- DAILY FIELDS -->
    <section class="card">
      <div class="card-head"><span><span class="slash">//</span>&nbsp; Daily Counts</span><span class="tag">01</span></div>
      <div class="card-body">
        <div class="sub-label">Roster</div>
        <div class="row3">
          <div class="field"><label>Chiefs</label><input type="number" min="0" id="d-chiefs" /></div>
          <div class="field"><label>Captains</label><input type="number" min="0" id="d-captains" /></div>
          <div class="field"><label>Operators</label><input type="number" min="0" id="d-operators" /></div>
        </div>
        <div class="sub-label">SD Cards</div>
        <div class="row2">
          <div class="field"><label>Used</label><input type="number" min="0" id="d-sd-used" /></div>
          <div class="field"><label>Left</label><input type="number" min="0" id="d-sd-left" /></div>
        </div>
        <div class="sub-label">Devices</div>
        <div class="row2">
          <div class="field"><label>Available</label><input type="number" min="0" id="d-dev-avail" /></div>
          <div class="field"><label>Deployed</label><input type="number" min="0" id="d-dev-dep" /></div>
          <div class="field"><label>Lost</label><input type="number" min="0" id="d-dev-lost" /></div>
          <div class="field"><label>Recovered</label><input type="number" min="0" id="d-dev-rec" /></div>
        </div>
        <div class="sub-label">Reporting Time</div>
        <div class="row2">
          <div class="field"><label>Actual Reporting Time</label><input type="time" id="d-art" /></div>
        </div>
      </div>
    </section>

    <!-- EVENTS -->
    <section class="card">
      <div class="card-head"><span><span class="slash">//</span>&nbsp; Events</span><span class="tag">02</span></div>
      <div class="card-body">
        <div id="events"></div>
        <button type="button" class="btn ghost" id="add-event">+ Add event</button>
      </div>
    </section>

    <div class="submit-row">
      <a class="btn ghost" id="go-attendance" href="#" style="margin-right:auto">Record attendance →</a>
      <button type="button" class="btn primary" id="submit">Submit Report</button>
    </div>

    <!-- Attendance moved to its own page at /attendance/:op_id so the daily
         report can land even when no one has time to enter 40 attendees. -->
    <div id="people" style="display:none"></div>
    <button id="add-person" type="button" style="display:none"></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.min.js"></script>
<script src="/config.js"></script>
<script>
(function () {
  const API      = window.BACKEND_URL;
  const TOKEN_K  = "spec_token";
  // op_id may come from the path (/r/:op_id or /report/:op_id both rewrite to r.html)
  // or from ?op= for deep links; the user can also switch via the dropdown. Treat the
  // URL opId as just the initial selection.
  let opId = "";
  {
    const parts = location.pathname.replace(/\/+$/, "").split("/").filter(Boolean);
    // parts: [] on "/", ["r","abc"] on /r/abc, ["report","abc"] on /report/abc.
    if (parts.length >= 2 && (parts[0] === "r" || parts[0] === "report")) {
      opId = decodeURIComponent(parts[1] || "");
    }
  }
  if (!opId) opId = new URLSearchParams(location.search).get("op") || "";
  let selectedDate = "";                // yyyy-mm-dd, empty = let server default
  let currentCtx   = null;              // last op context returned by the server
  let loadToken    = 0;                 // guards against out-of-order loads on quick changes
  let restoringDraft = false;           // suppresses draft-save while we're rehydrating the DOM
  let hasUnsavedText = false;           // powers the beforeunload warning
  let saveTimer = null;                 // debounce handle for writes to localStorage

  const DRAFT_PREFIX = "spec_draft:";
  const DRAFT_KEEP_DAYS = 14;           // TTL - older drafts get purged on load

  const meta     = document.getElementById("meta");
  const banner   = document.getElementById("status-banner");
  const appEl    = document.getElementById("app");
  const selOp    = document.getElementById("sel-op");
  const selDate  = document.getElementById("sel-date");
  const selHint  = document.getElementById("sel-date-hint");

  meta.textContent = opId || "-";

  // Grab token from ?token= and stash it, clean URL.
  (function captureToken() {
    const p = new URLSearchParams(location.search);
    const t = p.get("token");
    if (t) {
      localStorage.setItem(TOKEN_K, t);
      p.delete("token");
      const qs = p.toString();
      history.replaceState(null, "", location.pathname + (qs ? "?" + qs : ""));
    }
  })();

  function token() { return localStorage.getItem(TOKEN_K) || ""; }

  function redirectToLogin() {
    const next = encodeURIComponent(location.pathname);
    location.href = API + "/auth/google?next=" + next;
  }

  function showBanner(cls, msg) {
    banner.className = "banner " + cls;
    banner.textContent = msg;
    banner.classList.remove("hidden");
  }
  function hideBanner() { banner.className = "banner hidden"; banner.textContent = ""; }

  function resetFormState() {
    // Form should reset whenever op or date changes - otherwise stale people/events
    // from a previous selection get submitted against the new op/date.
    appEl.classList.add("hidden");
    document.getElementById("people").innerHTML = "";
    document.getElementById("events").innerHTML = "";
    document.querySelectorAll("#app input, #app select, #app textarea").forEach(el => {
      if (el.type === "checkbox" || el.type === "radio") el.checked = false;
      else if (el.tagName === "SELECT") el.selectedIndex = 0;
      else el.value = "";
    });
    personCounter = 0;
    hasUnsavedText = false;
  }

  // ---------- Draft autosave ----------
  // We snapshot every text/select value and any attendance metadata we can safely
  // serialize. Photos are File objects and cannot be stashed in localStorage, so
  // restored people with prior photos show a "re-attach photo" hint.
  function draftKey(op, d) { return DRAFT_PREFIX + (op || "_") + ":" + (d || "today"); }

  function purgeOldDrafts() {
    const cutoff = Date.now() - DRAFT_KEEP_DAYS * 86400000;
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith(DRAFT_PREFIX)) continue;
      try {
        const v = JSON.parse(localStorage.getItem(k) || "{}");
        if (!v.saved_at || new Date(v.saved_at).getTime() < cutoff) localStorage.removeItem(k);
      } catch (_) { localStorage.removeItem(k); }
    }
  }

  function snapshotForm() {
    const daily = {};
    ["d-chiefs","d-captains","d-operators","d-sd-used","d-sd-left",
     "d-dev-avail","d-dev-dep","d-dev-lost","d-dev-rec",
     "d-art"].forEach(id => {
      daily[id] = document.getElementById(id)?.value ?? "";
    });
    const events = [...document.querySelectorAll(".event-row")].map(r => ({
      ts: r.querySelector(".ev-ts")?.value || "",
      note: r.querySelector(".ev-note")?.value || "",
    }));
    // People were split off to /attendance; this draft only tracks report fields.
    return { daily, events };
  }

  function hasAnyContent(snap) {
    if (!snap) return false;
    if (Object.values(snap.daily || {}).some(v => v && String(v).trim())) return true;
    if ((snap.events || []).some(e => (e.ts && e.ts.trim()) || (e.note && e.note.trim()))) return true;
    return false;
  }

  function saveDraftNow() {
    if (restoringDraft || !opId) return;
    const snap = snapshotForm();
    const key = draftKey(opId, selectedDate);
    if (!hasAnyContent(snap)) {
      // Empty form - drop any stale draft so we don't nag on reload.
      localStorage.removeItem(key);
      hasUnsavedText = false;
      return;
    }
    try {
      localStorage.setItem(key, JSON.stringify({
        op_id: opId,
        report_date: selectedDate || null,
        saved_at: new Date().toISOString(),
        ...snap,
      }));
      hasUnsavedText = true;
    } catch (e) {
      // Quota exceeded is the likely failure - just log and move on.
      console.warn("draft save failed:", e);
    }
  }

  function scheduleDraftSave() {
    if (restoringDraft) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveDraftNow, 500);
  }

  function clearDraft(op, d) {
    localStorage.removeItem(draftKey(op, d));
    hasUnsavedText = false;
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem(draftKey(opId, selectedDate));
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }

  function restoreDraft(draft) {
    // Best-effort rehydration: run after addPerson() has cleared the default row.
    restoringDraft = true;
    try {
      // Daily fields.
      Object.entries(draft.daily || {}).forEach(([id, v]) => {
        const el = document.getElementById(id);
        if (el) el.value = v || "";
      });
      // Events.
      document.getElementById("events").innerHTML = "";
      (draft.events || []).forEach(ev => {
        addEvent();
        const rows = document.querySelectorAll(".event-row");
        const r = rows[rows.length - 1];
        r.querySelector(".ev-ts").value   = ev.ts   || "";
        r.querySelector(".ev-note").value = ev.note || "";
      });
      // People intentionally not restored here; they live on /attendance now.
    } finally {
      restoringDraft = false;
    }
    hasUnsavedText = hasAnyContent(draft);
  }

  // Capture any input/change anywhere in the form so the debounced save catches it.
  document.addEventListener("input", (e) => {
    if (e.target.closest("#app") || e.target.closest(".person") || e.target.closest(".event-row")) {
      scheduleDraftSave();
    }
  });
  document.addEventListener("change", (e) => {
    if (e.target.closest("#app") || e.target.closest(".person") || e.target.closest(".event-row")) {
      scheduleDraftSave();
    }
  });

  // Warn before leaving if there's unsaved text. Modern browsers show a generic
  // prompt regardless of the returned string.
  window.addEventListener("beforeunload", (e) => {
    if (hasUnsavedText) { e.preventDefault(); e.returnValue = ""; }
  });

  purgeOldDrafts();

  async function loadOpList() {
    if (!token()) return redirectToLogin();
    let res;
    try {
      res = await fetch(API + "/api/ops", {
        headers: { Authorization: "Bearer " + token() },
      });
    } catch (e) { return showBanner("err", "Network error: " + e.message); }
    if (res.status === 401) { localStorage.removeItem(TOKEN_K); return redirectToLogin(); }
    if (res.status === 403) { return showBanner("err", "This account is not authorized to submit reports. Ask an admin to add you as a reporter."); }
    if (!res.ok) { return showBanner("err", "Failed to load operations: " + res.status); }
    const { rows } = await res.json();
    const active = (rows || []).filter(r => r.is_active !== false);
    selOp.innerHTML = "";
    if (active.length === 0) {
      selOp.innerHTML = '<option value="">No operations available</option>';
      showBanner("err", "You have no active operations to report on. Ask an admin to assign you.");
      return;
    }
    selOp.appendChild(new Option("Select an operation...", ""));
    active.forEach(r => {
      const label = `${r.factory_name} - ${r.shift}`;
      selOp.appendChild(new Option(label, r.op_id));
    });
    // Preselect from URL if it matches one of the user's ops.
    if (opId && active.some(r => r.op_id === opId)) {
      selOp.value = opId;
      await loadContext();
    }
  }

  function initDatePicker() {
    const today = new Date();
    const todayStr = today.toISOString().slice(0, 10);
    const minDate = new Date(today.getTime() - 30 * 86400000).toISOString().slice(0, 10);
    selDate.value = todayStr;
    selDate.max   = todayStr;
    selDate.min   = minDate;
    selectedDate  = todayStr;
    selHint.textContent = `Backdated reports allowed up to 30 days (from ${minDate}).`;
  }

  selOp.onchange = async () => {
    opId = selOp.value;
    meta.textContent = opId || "-";
    resetFormState();
    hideBanner();
    if (opId) await loadContext();
  };
  selDate.onchange = async () => {
    selectedDate = selDate.value;
    resetFormState();
    hideBanner();
    if (opId) await loadContext();
  };

  async function loadContext() {
    if (!token()) return redirectToLogin();
    if (!opId) return;
    const myToken = ++loadToken;
    let res;
    const qs = selectedDate ? ("?date=" + encodeURIComponent(selectedDate)) : "";
    try {
      res = await fetch(API + "/api/op/" + encodeURIComponent(opId) + qs, {
        headers: { Authorization: "Bearer " + token() },
      });
    } catch (e) { return showBanner("err", "Network error: " + e.message); }
    if (myToken !== loadToken) return;   // user changed selection mid-flight

    if (res.status === 401) { localStorage.removeItem(TOKEN_K); return redirectToLogin(); }
    if (res.status === 403) { return showBanner("err", "You're not assigned to this operation."); }
    if (res.status === 404) { return showBanner("err", "Operation not found."); }
    if (res.status === 410) {
      const j = await res.json().catch(() => ({}));
      return showBanner("err", "Operation unavailable: " + (j.detail || "not active"));
    }
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      return showBanner("err", "Unexpected error: " + (j.detail || res.status));
    }

    const ctx = await res.json();
    currentCtx = ctx;
    renderOp(ctx);
    renderQuickNav(ctx);
    if (ctx.already_submitted) {
      showBanner("ok", `A report was already submitted for ${ctx.factory_name} on ${ctx.report_date}. Pick a different date to backfill another day.`);
      appEl.classList.add("hidden");
      return;
    }
    appEl.classList.remove("hidden");
    // Attendance lives on its own page now; point the link at the same op/date.
    const attendanceBtn = document.getElementById("go-attendance");
    if (attendanceBtn) {
      const qs = selectedDate ? ("?date=" + encodeURIComponent(selectedDate)) : "";
      attendanceBtn.href = "/attendance/" + encodeURIComponent(opId) + qs;
    }
    // Restore a report-only draft if one exists for this (op, date).
    const draft = loadDraft();
    if (draft && hasAnyContent(draft)) {
      restoreDraft(draft);
      const ts = draft.saved_at ? new Date(draft.saved_at).toLocaleString() : "";
      showBanner("warn", `Restored draft from ${ts}.`);
    }
  }

  function renderQuickNav(ctx) {
    // ctx.my_role is injected by /api/op/{op_id} - normalise owner->marshal for legacy JWTs.
    let role = ctx.my_role || "";
    if (role === "owner") role = "freddy";
    const host = document.getElementById("quick-nav");
    const links = [];
    // Edit op details - chiefs do this via Chief Admin for their assigned ops;
    // generals/marshals do it via Ops Admin.
    if (role === "chief") {
      links.push(`<a class="btn ghost" href="/ops/chief" target="_blank" rel="noopener">Edit op details →</a>`);
    } else if (["general", "freddy"].includes(role)) {
      links.push(`<a class="btn ghost" href="/ops/general" target="_blank" rel="noopener">Ops admin →</a>`);
    }
    if (["chief","general","freddy","viewer"].includes(role)) {
      links.push(`<a class="btn ghost" href="/ops/dashboard" target="_blank" rel="noopener">Dashboard →</a>`);
    }
    if (links.length) {
      host.innerHTML = links.join("");
      host.classList.remove("hidden");
    }
  }

  function renderOp(ctx) {
    document.getElementById("op-id-tag").textContent = ctx.op_id;
    const mapHtml = (() => {
      const u = ctx.map_link;
      if (!u || !/^https?:\/\//i.test(u)) return "";
      return `<a href="${esc(u)}" target="_blank" rel="noopener noreferrer" style="color:var(--text)">open map</a>`;
    })();
    const rows = [
      ["Factory",        esc(ctx.factory_name)],
      ["Shift",          esc(ctx.shift)],
      ["Location",       esc(ctx.location)],
      ["Sales Team",     esc(ctx.sales_team_name)],
      ["POC 1",          esc(joinLine(ctx.poc1_name, ctx.poc1_phone, ctx.poc1_role))],
      ["POC 2",          esc(joinLine(ctx.poc2_name, ctx.poc2_phone, ctx.poc2_role))],
      ["Shift Hours",    esc(joinRange(ctx.shift_start, ctx.shift_end))],
      ["Reporting Time", esc(ctx.reporting_time)],
      ["Deployment Start", esc(ctx.deployment_start)],
      ["Collection Start", esc(ctx.collection_start)],
      ["Report Submission Time", esc(ctx.report_submission_time)],
      ["Final Closing Time",     esc(ctx.final_closing_time)],
      ["Map",            mapHtml],
    ];
    const host = document.getElementById("op-ctx");
    host.innerHTML = rows
      .filter(([_,v]) => v && String(v).trim())
      .map(([k,v]) => `<div><div class="k">${k}</div><div class="v">${v}</div></div>`)
      .join("");
  }

  function joinLine(...parts) { return parts.filter(Boolean).join(" · "); }
  function joinRange(a,b) { return a && b ? `${a} - ${b}` : (a || b || ""); }
  function esc(v) {
    if (v === null || v === undefined) return "";
    return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // EVENTS
  function addEvent() {
    const row = document.createElement("div");
    row.className = "event-row";
    row.innerHTML = `
      <input type="datetime-local" class="ev-ts" />
      <input type="text" class="ev-note" placeholder="note" />
      <button type="button" class="btn ghost ev-rm">remove</button>
    `;
    row.querySelector(".ev-rm").onclick = () => row.remove();
    document.getElementById("events").appendChild(row);
  }
  document.getElementById("add-event").onclick = addEvent;

  // ATTENDANCE
  let personCounter = 0;
  function addPerson() {
    personCounter++;
    const n = personCounter;
    const wrap = document.createElement("div");
    wrap.className = "person";
    wrap.dataset.idx = n;
    wrap.innerHTML = `
      <div class="person-head">
        <span>Person ${n}</span>
        <button type="button" class="btn ghost rm">remove</button>
      </div>
      <div class="row2">
        <div class="field"><label>Full name</label><input type="text" class="p-name" required /></div>
        <div class="field"><label>Phone (10-digit)</label><input type="text" class="p-phone" inputmode="numeric" maxlength="10" pattern="[6-9][0-9]{9}" required /></div>
      </div>
      <div class="row2">
        <div class="field">
          <label>PAN or Aadhaar</label>
          <input type="text" class="p-pan" maxlength="14" placeholder="ABCDE1234F  or  12-digit Aadhaar" style="text-transform:uppercase" required />
        </div>
        <div class="field"><label>Role</label>
          <select class="p-role">
            <option value="operator" selected>operator</option>
            <option value="captain">captain</option>
            <option value="chief">chief</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Device location (required)</label>
        <div class="loc-row" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <span class="badge loc-badge">capturing…</span>
          <button type="button" class="btn tiny loc-retry" style="display:none">Retry</button>
        </div>
      </div>
      <div class="field">
        <label>Photo (optional, jpeg / heic)</label>
        <label class="photo-box">
          <span class="photo-label">Tap to capture or upload (optional)</span>
          <input type="file" class="p-photo" accept="image/jpeg,image/heic,image/heif" capture="environment" />
        </label>
        <div class="badge photo-badge" style="display:none"></div>
      </div>
    `;
    wrap.querySelector(".rm").onclick = () => { wrap.remove(); renumberPeople(); };
    wrap.querySelector(".p-photo").onchange = (e) => onPhotoPick(wrap, e.target.files[0]);
    wrap.querySelector(".loc-retry").onclick = () => captureLocation(wrap);
    document.getElementById("people").appendChild(wrap);
    captureLocation(wrap);
  }
  document.getElementById("add-person").onclick = addPerson;

  // Keep visible labels sequential (1, 2, 3, ...) regardless of add/remove history.
  // Without this, removing the middle row leaves gaps like "Person 1, Person 2, Person 5"
  // which has confused chiefs when the submit validator points at "Person 3".
  function renumberPeople() {
    const rows = document.querySelectorAll(".person");
    rows.forEach((row, i) => {
      const label = row.querySelector(".person-head span");
      if (label) label.textContent = `Person ${i + 1}`;
      row.dataset.idx = i + 1;
    });
    personCounter = rows.length;
  }

  async function captureLocation(personEl) {
    const badge = personEl.querySelector(".loc-badge");
    const retry = personEl.querySelector(".loc-retry");
    badge.className = "badge loc-badge";
    badge.textContent = "capturing…";
    retry.style.display = "none";
    try {
      const coords = await new Promise((res, rej) => {
        navigator.geolocation.getCurrentPosition(
          p => res(p.coords),
          e => rej(e),
          { enableHighAccuracy: true, timeout: 15000 }
        );
      });
      personEl.dataset.brLat = coords.latitude;
      personEl.dataset.brLng = coords.longitude;
      personEl.dataset.brAcc = coords.accuracy || "";
      badge.classList.add("ok");
      const acc = coords.accuracy ? ` (±${Math.round(coords.accuracy)}m)` : "";
      badge.textContent = `✓ ${coords.latitude.toFixed(5)}, ${coords.longitude.toFixed(5)}${acc}`;
      // If a photo was already picked, re-check distance.
      if (personEl.dataset.exifLat) updateDistanceBadge(personEl);
    } catch (e) {
      badge.classList.add("err");
      badge.textContent = e && e.code === 1 ? "permission denied" : "location unavailable";
      retry.style.display = "inline-block";
      delete personEl.dataset.brLat;
      delete personEl.dataset.brLng;
    }
  }

  async function onPhotoPick(personEl, file) {
    const badge = personEl.querySelector(".photo-badge");
    const label = personEl.querySelector(".photo-label");
    if (!file) {
      // user cleared the file; reset state
      badge.style.display = "none";
      label.textContent = "Tap to capture or upload (optional)";
      delete personEl.dataset.exifLat;
      delete personEl.dataset.exifLng;
      delete personEl.dataset.dist;
      return;
    }
    label.textContent = file.name + " · " + (file.size / 1024 / 1024).toFixed(2) + " MB";
    badge.style.display = "inline-block";
    badge.className = "badge photo-badge";
    badge.textContent = "reading EXIF…";

    let gps = null;
    try { gps = await exifr.gps(file); } catch (_) {}
    if (!gps || gps.latitude == null) {
      badge.classList.add("warn");
      badge.textContent = "photo attached · no GPS in EXIF";
      delete personEl.dataset.exifLat;
      delete personEl.dataset.exifLng;
      delete personEl.dataset.dist;
      return;
    }
    personEl.dataset.exifLat = gps.latitude;
    personEl.dataset.exifLng = gps.longitude;
    updateDistanceBadge(personEl);
  }

  function updateDistanceBadge(personEl) {
    const badge = personEl.querySelector(".photo-badge");
    if (!personEl.dataset.exifLat || !personEl.dataset.brLat) return;
    const d = haversineM(
      parseFloat(personEl.dataset.exifLat), parseFloat(personEl.dataset.exifLng),
      parseFloat(personEl.dataset.brLat),   parseFloat(personEl.dataset.brLng),
    );
    personEl.dataset.dist = d.toFixed(1);
    badge.className = "badge photo-badge";
    badge.style.display = "inline-block";
    if (d <= 200) {
      badge.classList.add("ok");
      badge.textContent = `✓ photo matches location (${Math.round(d)}m)`;
    } else {
      badge.classList.add("warn");
      badge.textContent = `⚠ photo is ${Math.round(d)}m from device (over 200m)`;
    }
  }

  function haversineM(lat1, lon1, lat2, lon2) {
    const R = 6371000, toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  // SUBMIT
  document.getElementById("submit").onclick = async function () {
    const btn = this;
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = "Submitting…";
    try {
      const payload = buildPayload();
      if (!payload) return;
      const fd = new FormData();
      fd.append("payload", JSON.stringify(payload.json));
      payload.photos.forEach(f => fd.append("photos", f));

      const res = await fetch(API + "/api/daily/" + encodeURIComponent(opId), {
        method: "POST",
        headers: { Authorization: "Bearer " + token() },
        body: fd,
      });
      if (res.status === 401) { localStorage.removeItem(TOKEN_K); return redirectToLogin(); }
      const j = await res.json().catch(() => ({}));
      if (!res.ok) { alert("Submit failed: " + (j.detail || res.status)); return; }
      // Submit landed - drop the draft so it won't prompt on next load.
      clearDraft(opId, selectedDate);
      // Local CSV backup of exactly what we sent - downloaded automatically.
      try { downloadCsv(payload.json); } catch (e) { console.warn("csv export failed", e); }
      appEl.classList.add("hidden");
      const pending = j.attendance_status === "pending";
      const who = j.validator_role === "captain" ? "a captain" : (j.validator_role === "chief" ? "a chief" : "");
      const msg = pending
        ? `Report submitted. Attendance is awaiting review by ${who}. CSV backup saved locally.`
        : "Report submitted. A CSV backup has been saved to your device.";
      showBanner("ok", msg);
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  };

  function downloadCsv(body) {
    const daily = body.daily || {};
    const att   = body.attendance || [];
    const events = body.events || [];
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");

    const lines = [];
    const push = (row) => lines.push(row.map(csvCell).join(","));

    // Section 1: metadata
    push(["Section", "SPEC-OPS daily report backup"]);
    push(["Op ID",      opId]);
    push(["Submitted",  new Date().toISOString()]);
    push([]);

    // Section 2: daily counts
    push(["Daily field", "Value"]);
    Object.entries(daily).forEach(([k, v]) => push([k, v ?? ""]));
    push([]);

    // Section 3: attendance
    push(["Full name","Phone","PAN or Aadhaar","Role","Browser lat","Browser lng","Accuracy m","Has photo"]);
    att.forEach(p => push([
      p.full_name, p.phone, p.pan, p.person_role,
      p.browser_lat, p.browser_lng, p.browser_accuracy_m ?? "",
      p.has_photo ? "yes" : "no",
    ]));
    push([]);

    // Section 4: events
    if (events.length) {
      push(["Event timestamp", "Note"]);
      events.forEach(ev => push([ev.ts, ev.note]));
      push([]);
    }

    const blob = new Blob([lines.join("\r\n") + "\r\n"], { type: "text/csv;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `spec-ops_${opId}_${stamp}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function csvCell(v) {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }

  function buildPayload() {
    const daily = {
      chiefs:               numVal("d-chiefs"),
      captains:             numVal("d-captains"),
      operators:            numVal("d-operators"),
      sd_cards_used:        numVal("d-sd-used"),
      sd_cards_left:        numVal("d-sd-left"),
      devices_available:    numVal("d-dev-avail"),
      devices_deployed:     numVal("d-dev-dep"),
      devices_lost:         numVal("d-dev-lost"),
      devices_recovered:    numVal("d-dev-rec"),
      actual_reporting_time:strVal("d-art"),
    };
    const events = [...document.querySelectorAll(".event-row")].map(r => {
      const ts = r.querySelector(".ev-ts").value;
      const note = r.querySelector(".ev-note").value.trim();
      if (!ts || !note) return null;
      return { ts: new Date(ts).toISOString(), note };
    }).filter(Boolean);

    // Attendance was split out to /attendance/:op_id - the daily-report submit
    // is now report + events only. The backend accepts an empty attendance
    // array, which lets a chief file today's counts without blocking on 40
    // attendees.
    return { json: { daily, events, attendance: [], report_date: selectedDate || null }, photos: [] };
  }

  function numVal(id) { const v = document.getElementById(id).value; return v === "" ? null : Number(v); }
  function strVal(id) { return document.getElementById(id).value || null; }

  initDatePicker();
  loadOpList();
})();
</script>
</body>
