<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Captain - SPEC-OPS</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#000; --surface:#0a0a0a; --border:rgba(255,255,255,0.14); --border-md:rgba(255,255,255,0.28);
    --text:#f2f2f2; --muted:#9a9a9a; --hint:#5a5a5a; --accent:#fff; --on-accent:#000;
    --green:#3ecf8e; --green-soft:rgba(62,207,142,0.10); --red:#f87171; --amber:#f5a524; --amber-soft:rgba(245,165,36,0.08);
    --mono:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }
  html,body { background:var(--bg); }
  body { color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55; min-height:100vh; }
  .page { max-width:820px; margin:0 auto; padding:2.2rem 1.4rem 5rem; }
  .topbar { display:flex; justify-content:space-between; align-items:center; padding-bottom:1rem; border-bottom:1px solid var(--border); margin-bottom:1.6rem; }
  .topbar h1 { font-size:12px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; }
  .topbar .meta { font-size:10px; letter-spacing:.14em; color:var(--hint); text-transform:uppercase; display:flex; gap:14px; align-items:center; }
  .banner { padding:14px 16px; border:1px solid var(--border); margin-bottom:1rem; font-size:12px; }
  .banner.warn { border-color:var(--amber); color:var(--amber); background:var(--amber-soft); }
  .banner.ok { border-color:var(--green); color:var(--green); background:var(--green-soft); }
  .banner.err { border-color:var(--red); color:var(--red); }
  .card { border:1px solid var(--border); margin-bottom:1rem; }
  .card-head { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); font-size:10px; letter-spacing:.18em; text-transform:uppercase; }
  .card-head .slash { color:var(--muted); }
  .card-body { padding:16px; }
  .op-row {
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:14px 16px; border:1px solid var(--border); margin-bottom:8px;
  }
  .op-row .meta { font-size:11px; color:var(--muted); }
  .op-row code { color:var(--hint); font-size:10px; }
  .op-row.pending { border-left:3px solid var(--amber); }
  .op-row.done    { border-left:3px solid var(--green); }
  .pill { display:inline-block; font-size:10px; letter-spacing:.14em; text-transform:uppercase; padding:3px 8px; border:1px solid var(--border); }
  .pill.ok { border-color:var(--green); color:var(--green); background:var(--green-soft); }
  .pill.warn { border-color:var(--amber); color:var(--amber); background:var(--amber-soft); }
  .pill.off { border-color:var(--red); color:var(--red); }
  .btn {
    border:1px solid var(--border-md); background:transparent; color:var(--text);
    padding:8px 14px; font-family:var(--mono); font-size:10px; letter-spacing:.16em;
    text-transform:uppercase; cursor:pointer; transition:background .12s, border-color .12s;
    text-decoration:none; display:inline-block;
  }
  .btn:hover { border-color:var(--accent); background:var(--surface); }
  .btn.primary { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .btn.tiny { padding:4px 8px; font-size:9px; }
  input, select, textarea {
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:13px; padding:8px 2px; outline:none;
  }
  input:focus, select:focus, textarea:focus { border-bottom-color:var(--accent); }
  textarea { resize:vertical; min-height:90px; border:1px solid var(--border); padding:10px; }
  select option { background:var(--surface); color:var(--text); }
  .field { margin-bottom:.9rem; }
  label { display:block; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:640px) { .row2 { grid-template-columns:1fr; } }
  .form-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:1rem; }
  .hidden { display:none; }
  .note-hint { font-size:11px; color:var(--hint); margin-top:6px; }
  .empty { padding:20px; text-align:center; color:var(--hint); font-size:11px; letter-spacing:.14em; text-transform:uppercase; }
</style>
<link rel="stylesheet" href="/assets/theme.css" />
<script src="/assets/theme.js"></script>
</head>
<body>

<div class="page">
  <div class="topbar">
    <h1>// Captain</h1>
    <div class="meta">
      <span id="who">-</span>
      <button class="btn tiny" id="signout">Sign out</button>
    </div>
  </div>

  <div id="status-banner" class="hidden"></div>
  <div id="reminder-banner" class="hidden"></div>

  <div id="app" class="hidden">
    <section class="card">
      <div class="card-head">
        <span><span class="slash">//</span>&nbsp; Your Operations</span>
        <span id="today-tag">-</span>
      </div>
      <div class="card-body" style="padding:14px 16px">
        <div id="ops-host"><div class="empty">loading…</div></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <span><span class="slash">//</span>&nbsp; Say Something</span>
      </div>
      <div class="card-body">
        <p class="note-hint">Drop a journal entry, flag something, or leave a greeting. Your note goes to the generals - they'll follow up if needed.</p>
        <div class="row2" style="margin-top:10px">
          <div class="field">
            <label>Kind</label>
            <select id="n-kind">
              <option value="journal" selected>journal</option>
              <option value="complaint">complaint</option>
              <option value="greeting">greeting</option>
              <option value="other">other</option>
            </select>
          </div>
          <div class="field">
            <label>About which op? (optional)</label>
            <select id="n-op"><option value="">- all / general -</option></select>
          </div>
        </div>
        <div class="field">
          <label>Note</label>
          <textarea id="n-note" maxlength="2000" placeholder="Anything on your mind…"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="send-note">Send</button>
        </div>
        <div id="note-ack" class="hidden" style="margin-top:10px"></div>
      </div>
    </section>
  </div>
</div>

<script src="/config.js"></script>
<script>
(function () {
  const API     = window.BACKEND_URL;
  const TOKEN_K = "spec_token";
  const whoEl   = document.getElementById("who");
  const banner  = document.getElementById("status-banner");
  const reminderBanner = document.getElementById("reminder-banner");
  const appEl   = document.getElementById("app");
  const opsHost = document.getElementById("ops-host");

  (function captureToken() {
    const p = new URLSearchParams(location.search);
    const t = p.get("token");
    if (t) {
      localStorage.setItem(TOKEN_K, t);
      p.delete("token");
      const qs = p.toString();
      history.replaceState(null, "", location.pathname + (qs ? "?" + qs : ""));
    }
  })();

  function token() { return localStorage.getItem(TOKEN_K) || ""; }
  function authHdr() { return { Authorization: "Bearer " + token() }; }
  function redirectToLogin() {
    location.href = API + "/auth/google?next=" + encodeURIComponent(location.pathname);
  }
  function showBanner(cls, msg) {
    banner.className = "banner " + cls;
    banner.textContent = msg;
    banner.classList.remove("hidden");
  }
  function showReminder(cls, msg) {
    reminderBanner.className = "banner " + cls;
    reminderBanner.textContent = msg;
    reminderBanner.classList.remove("hidden");
  }

  document.getElementById("signout").onclick = function () {
    localStorage.removeItem(TOKEN_K);
    location.reload();
  };

  async function bootstrap() {
    if (!token()) return redirectToLogin();
    let res;
    try { res = await fetch(API + "/auth/verify?token=" + encodeURIComponent(token())); }
    catch (e) { return showBanner("err", "Network error: " + e.message); }
    if (res.status === 401) { localStorage.removeItem(TOKEN_K); return redirectToLogin(); }
    if (!res.ok) return showBanner("err", "Auth check failed: " + res.status);
    const { user } = await res.json();
    whoEl.textContent = `${user.email} · ${user.role || "no role"}`;
    if (user.role === "owner") user.role = "freddy";  // legacy JWT compat
    if (!["captain","chief","general","freddy"].includes(user.role)) {
      return showBanner("err", "No role assigned. Ask a general to add you.");
    }
    appEl.classList.remove("hidden");
    await loadOps();
  }

  async function loadOps() {
    const res = await fetch(API + "/api/ops?include=today", { headers: authHdr() });
    if (!res.ok) { opsHost.innerHTML = `<div class="banner err">Failed to load ops: ${res.status}</div>`; return; }
    const { rows } = await res.json();
    if (rows.length === 0) {
      opsHost.innerHTML = `<div class="empty">You're not assigned to any operations yet. Ask your chief to add you.</div>`;
      document.getElementById("today-tag").textContent = todayStr();
      return;
    }
    document.getElementById("today-tag").textContent = todayStr();

    const pending = rows.filter(o => o.is_active && !o.already_submitted);
    if (pending.length > 0) {
      showReminder("warn", `Daily report reminder - ${pending.length} of your operations haven't been filled today.`);
    } else {
      const anyActive = rows.some(o => o.is_active);
      if (anyActive) showReminder("ok", "Today's reports are all submitted. Nice.");
    }

    opsHost.innerHTML = rows.map(op => {
      const state = !op.is_active          ? "off"
                  : op.already_submitted   ? "done"
                  : "pending";
      const pillCls  = state === "done" ? "ok" : state === "pending" ? "warn" : state === "off" ? "off" : "";
      const pillText = state === "done" ? "today: submitted"
                     : state === "pending" ? "today: pending"
                     : state === "off" ? "inactive"
                     : "unknown";
      return `
        <div class="op-row ${state}">
          <div>
            <div><strong>${esc(op.factory_name)}</strong> · ${esc(op.shift)}</div>
            <div class="meta"><code>${esc(op.op_id)}</code> · ${esc(op.location || '')}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="pill ${pillCls}">${pillText}</span>
            ${op.is_active ? `<a class="btn primary" href="/r/${encodeURIComponent(op.op_id)}">${op.already_submitted ? 'View / Edit' : 'Fill Report'}</a>` : ''}
          </div>
        </div>
      `;
    }).join("");

    // Populate the per-op dropdown in the note form.
    const sel = document.getElementById("n-op");
    withStatus.filter(o => o.is_active).forEach(op => {
      const o = document.createElement("option");
      o.value = op.op_id; o.textContent = `${op.factory_name} · ${op.shift}`;
      sel.appendChild(o);
    });
  }

  document.getElementById("send-note").onclick = async function () {
    const payload = {
      kind:  document.getElementById("n-kind").value,
      note:  document.getElementById("n-note").value.trim(),
      op_id: document.getElementById("n-op").value || null,
    };
    if (!payload.note) { alert("Write something first."); return; }
    this.disabled = true;
    const orig = this.textContent; this.textContent = "Sending…";
    const ack = document.getElementById("note-ack");
    try {
      const res = await fetch(API + "/api/notes", {
        method: "POST", headers: { ...authHdr(), "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) {
        ack.className = "banner err";
        ack.textContent = "Send failed: " + (j.detail || res.status);
      } else {
        ack.className = "banner ok";
        ack.textContent = "Sent. Thanks.";
        document.getElementById("n-note").value = "";
      }
      ack.classList.remove("hidden");
    } finally {
      this.disabled = false; this.textContent = orig;
    }
  };

  function todayStr() {
    const d = new Date();
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "2-digit" });
  }
  function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  bootstrap();
})();
</script>
</body>
</html>
